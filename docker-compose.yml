services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medschedule
      POSTGRES_PASSWORD: medschedule
      POSTGRES_DB: medschedule
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medschedule"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
