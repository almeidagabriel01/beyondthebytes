name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # GHSA-r5fr-rjxr-66jc (lodash_.template via @nestjs/swagger): no upstream patch
      # exists — lodash@4.18.0 was never published. Swagger templates never process
      # user-supplied input in this app so the risk is negligible. Raise to high once
      # @nestjs/swagger publishes a release that removes lodash.
      - run: pnpm audit --prod --audit-level=critical

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
